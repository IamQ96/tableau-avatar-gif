<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Transparent GIF Test</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;

      /* Transparency test background */
      background-color: #ffffff;
      background-image:
        linear-gradient(45deg, #d9d9d9 25%, transparent 25%),
        linear-gradient(-45deg, #d9d9d9 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #d9d9d9 75%),
        linear-gradient(-45deg, transparent 75%, #d9d9d9 75%);
      background-size: 32px 32px;
      background-position: 0 0, 0 16px, 16px -16px, -16px 0px;
    }

    img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      background: transparent;
    }
  </style>
</head>

<body>
  <img src="rajinikanth.gif" alt="Animated avatar">
</body>
</html>
