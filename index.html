<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Transparent GIF</title>
  <style>
    /* Force the browser canvas itself to be completely alpha-transparent */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0) !important; /* Absolute alpha transparency */
      overflow: hidden;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      background: transparent !important;
    }
  </style>
</head>
<body>
  <img src="rajinikanth.gif" alt="Animated avatar">
</body>
</html>
