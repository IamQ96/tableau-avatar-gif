<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Transparent GIF</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      background: transparent;
    }
  </style>
</head>

<body>
  <img src="rajinikanth.gif" alt="Animated avatar">
</body>
</html>
